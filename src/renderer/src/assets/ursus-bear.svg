<?xml version="1.0" encoding="UTF-8"?>
<!--
  Placeholder icon for Ursus (the OpenRouter/Ollama-only sibling router).
  This task (graph.ts dispatch wiring) needs this asset to exist so
  ToolStep.tsx's Ursus-branch import resolves; the real design asset is
  owned by a later task. This is a minimal, valid pixel-art bear-face glyph
  in a distinct (brown/tan) palette from ursa-teddy.svg's orange, styled to
  match the same 16x16 pixel-grid convention (rendered at 18x18 with
  image-rendering: pixelated via .pipeline-teddy in events.css). Safe to
  overwrite with a final asset later without any code changes.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="none"/>
  <!-- ears -->
  <rect x="2" y="1" width="3" height="3" fill="#8a5a34"/>
  <rect x="11" y="1" width="3" height="3" fill="#8a5a34"/>
  <rect x="3" y="2" width="1" height="1" fill="#6b4423"/>
  <rect x="12" y="2" width="1" height="1" fill="#6b4423"/>
  <!-- head -->
  <rect x="2" y="4" width="12" height="9" fill="#a97142"/>
  <rect x="2" y="4" width="12" height="1" fill="#8a5a34"/>
  <rect x="2" y="12" width="12" height="1" fill="#8a5a34"/>
  <rect x="2" y="4" width="1" height="9" fill="#8a5a34"/>
  <rect x="13" y="4" width="1" height="9" fill="#8a5a34"/>
  <!-- eyes -->
  <rect x="5" y="7" width="1" height="1" fill="#2b1a0f"/>
  <rect x="10" y="7" width="1" height="1" fill="#2b1a0f"/>
  <!-- snout -->
  <rect x="6" y="9" width="4" height="3" fill="#d9b48f"/>
  <rect x="7" y="10" width="2" height="1" fill="#2b1a0f"/>
</svg>
